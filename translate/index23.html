<script src="https://unpkg.com/axios/dist/axios.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.5.17/vue.js"></script>
<script>
  new Vue({
    el:'#app',
    data(){
      return{
        data:null,
        cari:null,
        loading: false,
        from:'id',
        to:'en'
      }
    },
    
    methods: {
    pesan() {

      this.loading = true,
      axios
      .get('https://translate.yandex.net/api/v1.5/tr.json/translate?key=trnsl.1.1.20181205T160438Z.d9c1f2f3127956af.d38a8770c4ab879be96b8b480d22b85cd5be1ba5&text='+this.cari+'&lang='+this.from+'-'+this.to+'')
      .then(response => (
        
        this.data = response.data.text[0]))
        .finally(() => this.loading = false)
      }
    },
  })

</script>
